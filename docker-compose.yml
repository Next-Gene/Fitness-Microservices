version: '3.4'

services:
  # ==========================================
  # 1. Shared Database (SQL Server)
  # ==========================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fitness_sql_server
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=MyComplexP@ssw0rd2025
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "MyComplexP@ssw0rd2025" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==========================================
  # 2. Message Broker (RabbitMQ)
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fitness_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ==========================================
  # 3. Workout Service
  # ==========================================
  workoutservice:
    build:
      context: .
      dockerfile: WorkoutService/Dockerfile
    image: amr0101/workout-service:latest
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - RabbitMq:Host=rabbitmq
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ==========================================
  # 4. Nutrition Service
  # ==========================================
  nutritionservice:
    build:
      context: .
      dockerfile: NutritionService/Dockerfile
    image: amr0101/nutrition-service:latest
    ports:
      - "8082:8080"
      - "8083:8081"
    depends_on:
      sqlserver:
        condition: service_healthy

  # ==========================================
  # 5. Fitness Calculation Service
  # ==========================================
  fitnesscalculationservice:
    build:
      context: .
      dockerfile: FitnessCalculationService/Dockerfile
    image: amr0101/fitness-calc-service:latest
    ports:
      - "8084:8080"
      - "8085:8081"
    depends_on:
      sqlserver:
        condition: service_healthy

  # ==========================================
  # 6. Progress Tracking Service
  # ==========================================
  progresstrackingservice:
    build:
      context: .
      dockerfile: ProgressTrackingService/Dockerfile
    image: amr0101/progress-service:latest
    ports:
      - "8086:8080"
      - "8087:8081"
    depends_on:
      sqlserver:
        condition: service_healthy

  # ==========================================
  # 7. Authentication Service
  # ==========================================
  authenticationservice:
    build:
      context: .
      dockerfile: AuthenticationService/Dockerfile
    image: amr0101/auth-service:latest
    ports:
      - "8090:8080"
      - "8091:8081"
    depends_on:
      sqlserver:
        condition: service_healthy

  # ==========================================
  # 8. API Gateway
  # ==========================================
  fitnessapigateway:
    build:
      context: .
      dockerfile: FitnessAPIGateway/Dockerfile
    image: amr0101/gateway-service:latest
    ports:
      - "8088:8080"
      - "8089:8081"
    depends_on:
      - workoutservice
      - nutritionservice
      - authenticationservice

  # ==========================================
  # 9. Smart Coach Service
  # ==========================================
  smartcoachservice:
    build:
      context: .
      dockerfile: SmartCoachService/Dockerfile
    image: amr0101/smart-coach-service:latest
    ports:
      - "8094:8080"
      - "8095:8081"

volumes:
  sql_data:
  rabbitmq_data:
